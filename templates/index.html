<!DOCTYPE html>
<html>

<head>
    <title>Fake News Detection</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
            padding-top: 50px;
        }

        .container {
            background: white;
            width: 60%;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
        }

        textarea {
            width: 90%;
            height: 150px;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
            margin-top: 20px;
            font-size: 16px;
        }

        h1 {
            color: #333;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Fake News Detection System</h1>

        <form method="POST">

            <textarea name="news" placeholder="Enter news text here..."></textarea>

            <br>

            <button type="submit">Predict</button>

        </form>

        {% if prediction %}
        <div class="result">
            Result: {{ prediction }}
        </div>
        {% endif %}

    </div>

</body>

</html>
